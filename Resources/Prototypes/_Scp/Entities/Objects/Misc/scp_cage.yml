- type: entity
  parent: BaseStructureDynamic
  id: BaseCrateScpCage
  abstract: true
  components:
  - type: Sprite
    drawdepth: Overdoors
    sprite: _Scp/Objects/Misc/scp_cage.rsi
    offset: 0, 0.5
    layers:
    - state: base
    - state: closed
      map: [ "enum.StorageVisualLayers.Door" ]
  - type: Icon
    sprite: _Scp/Objects/Misc/scp_cage.rsi
    state: closed
  # Копипаста с CrateGeneric
  - type: Transform
    noRot: true
  - type: InteractionOutline
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: -0.4,-0.4,0.4,0.29
        density: 50
        mask:
        - CrateMask #this is so they can go under plastic flaps
        layer:
        - MachineLayer
  # Копипаста кончилась
  - type: Deployable
    requiredTools:
    - Screwing
    deployed: true
  - type: Construction
    graph: Girder
    node: wall
    containers:
    - entity_storage

- type: entity
  parent: BaseCrateScpCage
  id: CrateScpCageFolded
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    scale: 0.5,0.65
  - type: Item
    size: Ginormous
  - type: MultiHandedItem

- type: entity
  parent: BaseCrateScpCage
  id: CrateScpCage
  abstract: true
  name: Scp cage
  components:
  - type: ResistLocker
    resistTime: 180 # 3 минут
  - type: EntityStorage
    openSound:
      path: /Audio/_Scp/Effects/door_open.ogg
    closeSound:
      path: /Audio/_Scp/Effects/door_close.ogg
      params:
        volume: -4
    air:
      volume: 800
    whitelist:
      components:
      - Scp
  - type: Lock
    lockTime: 5
  - type: AccessReader
    access: [["Security"], ["Research"]]
  - type: SuppressArtifactContainer
  - type: RadiationBlockingContainer
    resistance: 5
  - type: ScpCage
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: -0.4,-0.4,0.4,0.4
        density: 75
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: ItemSlots
  - type: Appearance
  - type: EntityStorageVisuals
    stateDoorOpen: open
    stateDoorClosed: closed
  - type: PlaceableSurface
    isPlaceable: false

- type: entity
  parent: CrateScpCage
  id: CrateScpCageScp173
  name: Scp173 cage
  components:
  - type: ScpCage
    stopReagent: Scp173Reagent
    stopReagentVolume: 25
    reason: scp173-cage-cannot-be-closed
    closeStorageBlacklist:
      components:
      - Scp173BlockStructureDamage
  - type: EntityStorage
    doAfterDelay: 3
    air:
      volume: 800
    whitelist:
      components:
      - Scp173
  - type: Deployable
    requiredTools:
    - Screwing
    deployed: false
    deployStates:
      false: CrateScpCageFolded
      true: CrateScpCageScp173
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          CrateScpCageDoor173:
            min: 1
            max: 1
          CrateScpBrokenCage173:
            min: 1
            max: 1
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  parent: BaseItem
  id: CrateScpCageDoor173
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Scp/Objects/Misc/scp_cage.rsi
    state: door
  - type: Item
    size: Ginormous
  - type: MultiHandedItem
  - type: Tag
    tags:
    - ScpCageDoor173

- type: entity
  parent: BaseStructureDynamic
  id: CrateScpBrokenCage173
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Scp/Objects/Misc/scp_cage.rsi
    layers:
    - state: open
    - state: broken
      map: [ "enum.ConstructionVisuals.Layer" ]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ConstructionVisuals.Key:
        enum.ConstructionVisuals.Layer:
          start: { state: broken }
          doorInserted: { state: door }
          doorAnchored: { state: door }
  - type: Transform
    noRot: true
  - type: InteractionOutline
  - type: Physics
  - type: Construction
    graph: ScpCage173
    node: start
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: constructionGraph
  id: ScpCage173
  start: start
  graph:
    - node: start
      actions:
      - !type:AppearanceChange
      edges:
        - to: doorInserted
          steps:
            - tag: ScpCageDoor173
              name: scp-cage-door-insert
              doAfter: 15
    - node: doorInserted
      actions:
      - !type:AppearanceChange
      edges:
        - to: doorAnchored
          steps:
            - tool: Anchoring
              doAfter: 15
    - node: doorAnchored
      actions:
      - !type:AppearanceChange
      edges:
        - to: finished
          steps:
            - tool: Welding
              doAfter: 15
    - node: finished
      entity: CrateScpCageScp173
