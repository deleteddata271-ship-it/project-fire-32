
- type: entity
  id: RightHarmArm0492
  name: malicious right arm
  description: A dark steel arm. When replacing the right arm surgically, the patient gains the ability to deliver painful strikes to enemies with it.
  suffix: SCP-049-2
  parent: [PartCyber, BaseRightArm]
  components:
    - type: BaseLayerId
      layer: RHarmArm0492
    - type: Sprite
      sprite: _Scp/Objects/Misc/scp049_limbs/icons.rsi
      state: "icon_harm_arm"
    - type: Icon
      sprite: _Scp/Objects/Misc/scp049_limbs/icons.rsi
      state: "icon_harm_arm"
    - type: LimbWithItems
      action: ActionScp0492ToggleHarmHandRight
    - type: LimbItemStorage
      items:
        - HarmArmWeapon0492
    - type: Tag
      tags:
      - LimbScp0492

- type: entity
  id: LeftTubeArm0492
  name: tubular left arm
  description: An elongated copper tube. When replacing the left arm surgically, the patient gains the ability to shoot their bodily waste through the tube.
  suffix: SCP-049-2
  parent: [PartCyber, BaseLeftArm]
  components:
    - type: BaseLayerId
      layer: LTubeArm0492
    - type: Sprite
      sprite: _Scp/Objects/Misc/scp049_limbs/icons.rsi
      state: "icon_tube_arm"
    - type: Icon
      sprite: _Scp/Objects/Misc/scp049_limbs/icons.rsi
      state: "icon_tube_arm"
    - type: LimbWithItems
      action: ActionScp0492ToggleTubeHandLeft
    - type: LimbItemStorage
      items:
        - TubeArmWeapon0492
    - type: Tag
      tags:
      - LimbScp0492

- type: entity
  id: LeftSpringLeg0492
  name: springy left leg
  description: A large silver spring. When replacing the left leg surgically, the patient begins to move faster.
  suffix: SCP-049-2
  parent: [PartCyber, BaseLeftLeg]
  components:
    - type: BaseLayerId
      layer: LSpringLeg0492
    - type: Sprite
      sprite: _Scp/Objects/Misc/scp049_limbs/icons.rsi
      state: "icon_spring_leg"
    - type: Icon
      sprite: _Scp/Objects/Misc/scp049_limbs/icons.rsi
      state: "icon_spring_leg"
    - type: MovementBodyPart
      sprintSpeed : 5.825 # +5%
      maxDensity: 111
    - type: Tag
      tags:
      - LimbScp0492

- type: entity
  id: OrganFlashEyes0492
  parent: 
  - BaseItem
  - BaseOrganEyes
  name: tube eyes
  description: Two flexible tubes with bulbs at the ends. When replacing the eyes surgically, the patient stops getting blinded by flashes.
  suffix: SCP-049-2
  components:
  - type: Sprite
    sprite: _Scp/Objects/Misc/scp049_limbs/icons.rsi
    state: "icon_flash_eyes"
  - type: Organ
  - type: Item
    size: Normal
  - type: FunctionalOrgan
    comps:
    - type: FlashImmunity
  - type: OrganVisualization
    layer: Eyes
    prototype: FlashEyes0492
  - type: Tag
    tags:
    - LimbScp0492

- type: entity
  id: OrganTubeLungs0492
  parent: 
