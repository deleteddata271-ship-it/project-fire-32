- type: entity
  parent: BaseItem
  id: HarmArmWeapon0492
  categories: [ HideSpawnMenu ]
  components:
  - type: BloodSplatterer
    probability: 0.4
    bloodLineProbability: 0.1
  - type: Sharp
  - type: Execution
    doAfterDuration: 4.0
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Slash: 20
        Structural: 30
    attackRate: 0.6
  - type: MeleeThrowOnHit
    speed: 2
    distance: 0.25
  - type: Sprite
    sprite: _Scp/Objects/Misc/scp049_limbs/icons.rsi
    state: "icon_harm_arm"

- type: entity
  parent: BaseItem
  id: TubeArmWeapon0492
  categories: [ HideSpawnMenu ]
  components:
