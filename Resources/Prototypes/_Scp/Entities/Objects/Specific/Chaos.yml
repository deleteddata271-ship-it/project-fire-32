# PINPOINTER

- type: entity
  parent: [PinpointerStationAlt, BaseChaosContraband]
  name: chaos pinpointer
  description: Universal pinpointer for special operations
  id: ChaosPinpointer
  suffix: Station
  components:
  - type: Sprite
    layers:
    - state: pinpointer-chaos
      map: ["enum.PinpointerLayers.Base"]
    - state: pinonnull
      map: ["enum.PinpointerLayers.Screen"]
      shader: unshaded
      visible: false
  - type: Icon
    state: pinpointer-chaos
  - type: Pinpointer
    component: BecomesStation
    targetName: the station
    updateTargetName: true

- type: entity
  parent: [SyndiHypo, BaseChaosContraband]
  id: ChaosHypo
  name: Chaos hypospray
  description: By reverse engineering Foundation technology, the Chaos Insurgency produces them in limited quantities for its own use.
  components:
  - type: Sprite
    sprite: _Scp/Objects/Specific/chaos_hypo.rsi
    layers:
      - state: hypo
        map: ["enum.SolutionContainerLayers.Base"]
      - state: hypo_fill1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: Item
    sprite: _Scp/Objects/Specific/chaos_hypo.rsi

- type: entity
  parent: [BaseItem, BaseChaosContraband]
  name: ball
  description: A universal ball used to indicate the direction of the pinpointer.
  id: ChaosPinBall
  components:
  - type: Sprite
    sprite: _Scp/Objects/Specific/Chaos/chaos_pin_ball.rsi
    state: icon
  - type: Icon
    sprite: _Scp/Objects/Specific/Chaos/chaos_pin_ball.rsi
    state: icon
  - type: PinpointerLinker
  - type: EmbeddableProjectile
    offset: 0.3,0.0
    removalTime: 1.0
  - type: ThrowingAngle
    angle: 315
  - type: LandAtCursor
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 0.5

# IMPLANT ACTION

- type: entity
  parent: ActionOpenUplinkImplant
  id: ActionOpenTerminalImplant
  name: Open Terminal
  description: Opens the Chaos Insurgency terminal embedded under your skin
  components:
  - type: Action
    itemIconStyle: BigAction
    priority: -20
    icon:
      sprite: _Scp/Objects/Devices/chaos_uplink.rsi
      state: icon

# UPLINK
# spy
- type: entity
  parent: BaseSubdermalImplant #StorePresetUplink
  id: ChaosSpyUplinkImplant
  name: terminal implant
  description: This implant lets the user access a hidden Chaos Insurgency terminal at will.
  components:
  - type: SubdermalImplant
    implantAction: ActionOpenTerminalImplant
    whitelist:
      components:
      - Hands
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
  - type: Store
    name: store-preset-name-ChaosUplink
    categories:
    - ChaosSpyWeapon
    - ChaosSpyWeaponAmmo
    - ChaosSpyEquipment
    - ChaosSpyMedkit
    - ChaosSpyOther
    currencyWhitelist:
    - SupplyPoint
    balance:
      SupplyPoint: 0
  - type: Tag
    tags:
    - SubdermalImplant

- type: entity
  id: ChaosSpyUplinkImplanter
  name: uplink implanter
  parent: [BaseImplantOnlyImplanterSyndi, BaseChaosContraband]
  components:
  - type: Implanter
    implant: ChaosSpyUplinkImplant

# raiders
- type: entity
  parent: [BaseItem, BaseChaosContraband]
  id: BaseUplinkChaos
  abstract: true
  components:
  - type: Sprite
    sprite: _Scp/Objects/Devices/chaos_uplink.rsi
    layers:
    - state: icon
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
  - type: ActivatableUI
    key: enum.StoreUiKey.Key
  - type: Store
    refundAllowed: false
    ownerOnly: true
    balance:
      SupplyPoint: 40
    buySuccessSound:
      path: /Audio/Effects/Arcade/newgame.ogg
  - type: Tag
    tags:
    - ScpChaosUplink
  - type: Item
    shape:
    - 0,0,1,1

- type: entity
  parent: [ BaseUplinkChaos, StorePresetScpChaosUplink]
  id: LeaderUplinkChaos
  name: Chaos Terminal
  description: A special chaos terminal
  components:
  - type: Store
    balance:
      SupplyPoint: 55
    buySuccessSound:
      path: /Audio/Effects/Arcade/newgame.ogg

- type: entity
  parent: [ BaseUplinkChaos, StorePresetScpChaosUplink]
  id: UplinkChaos
  name: Chaos Terminal
  description: A special chaos terminal
  components:
  - type: Store
    balance:
      SupplyPoint: 40
    buySuccessSound:
      path: /Audio/Effects/Arcade/newgame.ogg
