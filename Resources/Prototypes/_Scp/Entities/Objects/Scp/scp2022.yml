- type: entity
  parent: Pill
  id: PillScp2022
  suffix: SCP-2022
  components:
  - type: Sprite
    sprite: _Scp/Objects/Scp/scp-2022.rsi
    layers:
    - state: pill
      shader: unshaded
  - type: Pill
    useStandardVisuals: false
  - type: PointLight
    radius: 1.3
    energy: 15.0
    color: "#FFCC00"
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 10
        reagents:
        - ReagentId: Scp2022Reagent
          Quantity: 10

- type: entity
  parent:
  - PillCanister
  - BaseItemScp
  id: PillCanisterScp2022
  name: pill box
  description: The packaging promises relief from depression and the energy of the world's finest resorts.
  suffix: SCP-2022
  components:
  - type: Sprite
    sprite: _Scp/Objects/Scp/scp-2022.rsi
    state: canister
  - type: Item
    size: Small
  - type: Storage
    grid:
    - 0,0,4,1
  - type: StorageFill
    contents:
    - id: PillScp2022
      amount: 10
  - type: GuideHelp
    guides:
    - ScpResearch
