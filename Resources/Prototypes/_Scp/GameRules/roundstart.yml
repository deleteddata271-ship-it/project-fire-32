- type: entity
  abstract: true
  parent: BaseGameRule
  id: BaseChaosRaidRule
  components:
  - type: RandomMetadata
    nameSegments:
    - NamesOperationPrefix
    - NamesOperationSuffix
    nameFormat: name-format-nuclear-operation
  - type: RuleGrids
  - type: AntagSelection
  - type: AntagLoadProfileRule
    speciesOverride: Human

- type: entity
  id: ScpChaosRaid
  parent: BaseChaosRaidRule
  components:
  - type: GameRule
    minPlayers: 25
  - type: LoadMapRule
    mapPath: /Maps/_Scp/Nonstation/ChaosPlanet.yml
  - type: ChaosRaidRule
  - type: AntagRandomObjectives
    sets:
    - groups: ChaosRaidObjectiveGroups
      maxPicks: 4
    maxDifficulty: 3
  - type: AntagSelection
    selectionTime: PrePlayerSpawn
    definitions:
    - prefRoles: [ ChaosRaiderLeader ]
      fallbackRoles: [ ChaosRaiderFighter, ChaosRaiderMedic ]
      spawnerPrototype: SpawnPointChaosRaiderLeader
      startingGear: ChaosLeaderGear
      max: 1
      roleLoadout:
      - RoleSurvivalNukie
      components:
      - type: ShowMessageOnSpawn
        message: chaos-raid-rules-window
      - type: GhostPanelAntagonistMarker
        name: ghost-panel-antagonist-chaos-raider-leader-name
        description: ghost-panel-antagonist-chaos-raider-leader-description
        priority: 10
      - type: MobChaosRaider
      - type: RandomMetadata
        nameSegments:
        - NamesChaosLeader
        - LastNamesChaos
        nameFormat: name-format-ert
      - type: NpcFactionMember
        factions:
        - Chaos
      mindRoles:
      - MindRoleChaosRaiderLeader
    - prefRoles: [ ChaosRaiderMedic ]
      fallbackRoles: [ ChaosRaiderFighter, ChaosRaiderLeader ]
      spawnerPrototype: SpawnPointChaosRaiderMedic
      startingGear: ChaosMedicGear
      min: 1
      max: 3
      roleLoadout:
      - RoleSurvivalNukie
      components:
      - type: ShowMessageOnSpawn
        message: chaos-raid-rules-window
      - type: GhostPanelAntagonistMarker
        name: ghost-panel-antagonist-chaos-raider-medic-name
        description: ghost-panel-antagonist-chaos-raider-medic-description
        priority: 10
      - type: MobChaosRaider
      - type: RandomMetadata
        nameSegments:
        - NamesChaosMedic
        - LastNamesChaos
        nameFormat: name-format-ert
      - type: NpcFactionMember
        factions:
        - Chaos
      mindRoles:
      - MindRoleChaosRaiderMedic
    - prefRoles: [ ChaosRaiderFighter ]
      fallbackRoles: [ ChaosRaiderLeader, ChaosRaiderMedic ]
      spawnerPrototype: SpawnPointChaosRaiderFighter
      min: 4
      max: 8
      playerRatio: 5
      startingGear: ChaosGear
      roleLoadout:
      - RoleSurvivalNukie
      components:
      - type: ShowMessageOnSpawn
        message: chaos-raid-rules-window
      - type: GhostPanelAntagonistMarker
        name: ghost-panel-antagonist-chaos-raider-fighter-name
        description: ghost-panel-antagonist-chaos-raider-fighter-description
        priority: 10
      - type: MobChaosRaider
      - type: RandomMetadata
        nameSegments:
        - NamesChaos
        - LastNamesChaos
        nameFormat: name-format-ert
      - type: NpcFactionMember
        factions:
        - Chaos
      mindRoles:
      - MindRoleChaosRaiderFighter
  - type: DynamicRuleCost
    cost: 200

- type: entity
  id: ScpMetaGarbageSpawn
  parent: BaseGameRule
  components:
  - type: MetaGarbageSpawnRule

- type: entity
  id: BasicFoundationEventScheduler
  parent: BaseGameRule
  components:
  - type: BasicStationEventScheduler
    minimumTimeUntilFirstEvent: 480
    minMaxEventTiming:
      min: 360 # 6 mins
      max: 720 # 12 mins
    scheduledGameRules: !type:NestedSelector
      tableId: ScpBasicGameRulesTable
  - type: RoundstartStationVariationRule
    rules:
    - id: ScpSolidWallRustingVariationPass
    - id: ScpReinforcedWallRustingVariationPass

- type: entity
  id: BasicFoundationChillEventScheduler
  parent: BaseGameRule
  components:
  - type: BasicStationEventScheduler
    minimumTimeUntilFirstEvent: 480
    minMaxEventTiming:
      min: 360 # 6 mins
      max: 720 # 12 mins
    scheduledGameRules: !type:NestedSelector
      tableId: ScpBasicChillGameRulesTable

- type: entityTable
  id: ScpBasicGameRulesTable
  table: !type:AllSelector
    children:
    - !type:NestedSelector
      tableId: ScpBasicCalmEventsTable
    - !type:NestedSelector
      tableId: ScpEventsTable
    - !type:NestedSelector
      tableId: ScpAntagEventsTable
    - !type:NestedSelector
      tableId: CargoGiftsTable
    - !type:NestedSelector
      tableId: CalmPestEventsTable

- type: entityTable
  id: ScpBasicChillGameRulesTable
  table: !type:AllSelector
    children:
    - !type:NestedSelector
      tableId: ScpBasicCalmEventsTable
    - !type:NestedSelector
      tableId: ScpEventsTable
    - !type:NestedSelector
      tableId: CargoGiftsTable
    - !type:NestedSelector
      tableId: CalmPestEventsTable

- type: entityTable
  id: ScpBasicCalmEventsTable
  table: !type:AllSelector
    children:
    - id: BluespaceArtifact
    - id: BureaucraticError
    - id: ClericalError
    - id: ScpCockroachMigration
    - id: GreytideVirus
    - id: IonStorm
    - id: MassHallucinations
    - id: MimicVendorRule
    - id: MouseMigration
    - id: RandomSentience
    - id: VentClog
    - id: GasLeak
    - id: SolarFlare

- type: entityTable
  id: ScpAntagEventsTable
  table: !type:AllSelector
    children:
    - id: Scp2054X

- type: entity
  id: FreeScpRule
  parent: BaseGameRule
  components:
  - type: FreeScpRule
