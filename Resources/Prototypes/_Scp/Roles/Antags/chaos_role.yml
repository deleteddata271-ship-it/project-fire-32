#region ANTAGS

- type: antag
  id: ChaosRaiderLeader
  name: roles-antag-chaos-raider-leader-name
  antagonist: true
  setPreference: true
  playTimeTracker: AntagChaosRaiderLeader
  objective: roles-antag-chaos-raider-leader-objective
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 15h
  - !type:AgeRequirement
    requiredAge: 25
  - !type:AgeRequirement
    requiredAge: 45
    inverted: true

- type: antag
  id: ChaosRaiderMedic
  name: roles-antag-chaos-raider-medic-name
  antagonist: true
  setPreference: true
  playTimeTracker: AntagChaosRaiderMedic
  objective: roles-antag-chaos-raider-medic-objective
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 15h
  - !type:RoleTimeRequirement
    role: JobMedicalSpecialist
    time: 5h
  - !type:AgeRequirement
    requiredAge: 25
  - !type:AgeRequirement
    requiredAge: 45
    inverted: true

- type: antag
  id: ChaosRaiderFighter
  name: roles-antag-chaos-raider-fighter-name
  antagonist: true
  setPreference: true
  playTimeTracker: AntagChaosRaiderFighter
  objective: roles-antag-chaos-raider-fighter-objective
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 10h
  - !type:AgeRequirement
    requiredAge: 25
  - !type:AgeRequirement
    requiredAge: 45
    inverted: true

#regionend


#дефиб ПХ медика
- type: entity
  parent: [DefibrillatorSyndicate, BaseChaosContraband]
  id: DefibrillatorChaos
  components:
  - type: Contraband
    severity: Chaos
  - type: Sprite
    sprite: _Scp/Objects/Specific/Medical/defibchaos.rsi
    layers:
    - state: icon
    - state: screen
      map: [ "enum.ToggleableVisuals.Layer" ]
      visible: false
      shader: unshaded
    - state: ready
      map: [ "enum.PowerDeviceVisualLayers.Powered" ]
      shader: unshaded

#рюкзак ПХ
- type: entity
  parent: [ClothingBackpackMerc, BaseChaosContraband]
  id: ClothingBackpackChaos
  components:
  - type: Sprite
    sprite: _Scp/Clothing/Back/Backpacks/chaos.rsi
    state: icon

#рюкзак ПХ (заполн)
- type: entity
  parent: ClothingBackpackChaos
